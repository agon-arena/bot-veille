name: Collecte automatique bot veille

on:
  schedule:
    # 3 collectes/jour : 7h, 12h, 18h UTC (= 9h, 14h, 20h heure Paris en été)
    - cron: '0 7 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:  # déclenchement manuel depuis l'onglet Actions

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Déclencher la collecte
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            "${{ secrets.BOT_VEILLE_URL }}/refresh?token=${{ secrets.BOT_VEILLE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"minSources": 3}' \
            --max-time 60 \
            --retry 3 \
            --retry-delay 10)
          echo "HTTP $HTTP_STATUS — $(cat /tmp/response.txt)"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Erreur collecte (HTTP $HTTP_STATUS)" && exit 1
          fi
