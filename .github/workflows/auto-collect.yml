name: Collecte automatique bot veille

on:
  schedule:
    # Vérification toutes les 5 min (au lieu de 15) : GitHub ne garantit pas
    # l'exécution exacte des cron schedule et peut sauter des occurrences sous
    # charge (cf. incident du 10/07/2026 : aucun run entre 12h36 et 15h19 UTC,
    # créneau de 18h00 Réunion entièrement raté). Repo public → minutes gratuites
    # illimitées, augmenter la fréquence ne coûte rien. La collecte elle-même ne
    # se déclenche réellement que si l'heure configurée (± tolérance côté serveur)
    # est atteinte.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # déclenchement manuel depuis l'onglet Actions

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Vérifier/déclencher la collecte
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            "${{ secrets.BOT_VEILLE_URL }}/api/auto-collect-tick?token=${{ secrets.BOT_VEILLE_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 60 \
            --retry 3 \
            --retry-delay 10)
          echo "HTTP $HTTP_STATUS — $(cat /tmp/response.txt)"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Erreur (HTTP $HTTP_STATUS)" && exit 1
          fi
